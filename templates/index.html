<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ollama Chat — {{ model }}</title>

  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Syne:wght@400;600&display=swap" rel="stylesheet"/>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0e10;
      --surface: #18181b;
      --border: #2a2a2f;
      --accent: #7c6dfa;
      --accent-dim: #3d3577;
      --text: #e4e4e7;
      --muted: #71717a;
      --user-bg: #1e1b3a;
      --bot-bg: #18181b;
      --font-head: 'Syne', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 14px;
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
    }

    header h1 {
      font-family: var(--font-head);
      font-size: 15px;
    }

    header span {
      margin-left: auto;
      font-size: 11px;
      color: var(--muted);
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 3px 8px;
      border-radius: 4px;
    }

    #chat-box {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .msg {
      display: flex;
      flex-direction: column;
      max-width: 80%;
    }

    .msg.user { align-self: flex-end; align-items: flex-end; }
    .msg.bot  { align-self: flex-start; }

    .label {
      font-size: 10px;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .bubble {
      padding: 10px 14px;
      border-radius: 8px;
      line-height: 1.6;
      white-space: pre-wrap;
    }

    .msg.user .bubble {
      background: var(--user-bg);
      border: 1px solid var(--accent-dim);
    }

    .msg.bot .bubble {
      background: var(--bot-bg);
      border: 1px solid var(--border);
    }

    .thinking {
      color: var(--muted);
      font-style: italic;
    }

    .thinking-dots::after {
      content: '';
      animation: dots 1.2s steps(4, end) infinite;
    }

    @keyframes dots {
      0% { content: ''; }
      25% { content: '.'; }
      50% { content: '..'; }
      75% { content: '...'; }
    }

    .error-bubble {
      background: #2a1010;
      border: 1px solid #7f2020;
      color: #f87171;
      padding: 10px;
      border-radius: 8px;
    }

    footer {
      padding: 14px 20px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
    }

    textarea {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px;
      border-radius: 6px;
      resize: none;
      height: 42px;
    }

    button {
      padding: 0 16px;
      border-radius: 6px;
      cursor: pointer;
    }

    #send-btn {
      background: var(--accent);
      color: white;
      border: none;
    }

    #clear-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
    }

    .empty-state {
      margin: auto;
      text-align: center;
      color: var(--muted);
    }
  </style>
</head>

<body>

<header>
  <div class="dot"></div>
  <h1>Ollama Chat</h1>
  <span>{{ model }}</span>
</header>

<div id="chat-box">
  <div class="empty-state" id="empty">
    <p>Start chatting with <code>{{ model }}</code></p>
  </div>
</div>

<footer>
  <textarea id="user-input" placeholder="Type a message..."></textarea>
  <button id="clear-btn">Clear</button>
  <button id="send-btn">Send ↑</button>
</footer>

<script>
const chatBox = document.getElementById('chat-box');
const input = document.getElementById('user-input');
const sendBtn = document.getElementById('send-btn');
const clearBtn = document.getElementById('clear-btn');
const empty = document.getElementById('empty');

let history = [];

function addMsg(role, text, extra='') {
  empty.style.display = 'none';

  const wrap = document.createElement('div');
  wrap.className = `msg ${role}`;

  const label = document.createElement('div');
  label.className = 'label';
  label.textContent = role === 'user' ? 'you' : '{{ model }}';

  const bubble = document.createElement('div');
  bubble.className = 'bubble ' + extra;
  bubble.textContent = text;

  wrap.append(label, bubble);
  chatBox.appendChild(wrap);
  chatBox.scrollTop = chatBox.scrollHeight;

  return bubble;
}

function addError(msg) {
  const div = document.createElement('div');
  div.className = 'error-bubble';
  div.textContent = '⚠ ' + msg;
  chatBox.appendChild(div);
}

async function sendMessage() {
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  sendBtn.disabled = true;

  addMsg('user', text);
  history.push({ role: 'user', content: text });

  const thinkBubble = addMsg('bot', 'Thinking', 'thinking thinking-dots');

  try {
    const res = await fetch('/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: history })
    });

    if (!res.ok) throw new Error(res.status);

    const data = await res.json();

    if (data.error) {
      thinkBubble.parentElement.remove();
      addError(data.error);
    } else {
      thinkBubble.className = 'bubble';
      thinkBubble.textContent = data.reply;
      history.push({ role: 'assistant', content: data.reply });
    }

  } catch (e) {
    thinkBubble.parentElement.remove();
    addError('Server/Network error');
  } finally {
    sendBtn.disabled = false;
    input.focus();
  }
}

sendBtn.onclick = sendMessage;

input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

clearBtn.onclick = () => {
  history = [];
  chatBox.innerHTML = '';
  chatBox.appendChild(empty);
  empty.style.display = '';
};

window.onload = () => input.focus();
</script>

</body>
</html>
